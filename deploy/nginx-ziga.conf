# nginx-ziga.conf — Nginx reverse-proxy server block for ziga-data.
#
# WHAT:  Terminates TLS with a Cloudflare Origin certificate and proxies to the
#        ziga binary listening on localhost. Rate-limits /api/ and lifts the
#        body-size ceiling above the app's 5 MB image limit.
# WHERE: Install to /etc/nginx/sites-available/ziga.conf, then:
#          sudo ln -s /etc/nginx/sites-available/ziga.conf /etc/nginx/sites-enabled/ziga.conf
#          sudo nginx -t && sudo systemctl reload nginx
#        See deploy/RUNBOOK.md §c (cert) and §d (install).
#
# ---------------------------------------------------------------------------
# STAGING NOTE: Until DNS for zigadata.com is flipped on Cloudflare, this block
# is INERT — no traffic reaches app.zigadata.com. Staging access in this pass is
# via an SSH tunnel straight to the app port (see RUNBOOK §f). Installing this
# now keeps the config versioned and ready; it does no harm while DNS is unset.
# ---------------------------------------------------------------------------

# Rate-limit zone for the API. 10 requests/sec per client IP, keyed off the
# real client address (see the real-IP note in the RUNBOOK — behind Cloudflare
# $binary_remote_addr is Cloudflare's edge unless real-ip restoration is set up).
limit_req_zone $binary_remote_addr zone=ziga_api:10m rate=10r/s;

# HTTP :80 — redirect everything to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name app.zigadata.com;

    return 301 https://$host$request_uri;
}

# HTTPS :443 — TLS termination + reverse proxy.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.zigadata.com;

    # Cloudflare Origin certificate. These paths are PLACEHOLDERS — the runbook
    # (§c) covers creating the cert in the Cloudflare dashboard and placing it
    # here. Do not commit real certs or keys.
    ssl_certificate     /etc/ssl/cloudflare/zigadata.pem;
    ssl_certificate_key /etc/ssl/cloudflare/zigadata.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Must exceed the app's 5 MB (5,242,880 B) image upload limit so Nginx does
    # not reject a valid upload before the app can return its own 4xx.
    client_max_body_size 6m;

    # API: rate-limited. burst=20 absorbs short spikes; nodelay serves burst
    # requests immediately rather than queuing them.
    location /api/ {
        limit_req zone=ziga_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else (embedded UI, /healthz, static assets).
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
