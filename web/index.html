<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ziga Data</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Ziga Data</div>
    <nav class="views">
      <a href="#/" data-view="review">Review</a>
      <a href="#/history" data-view="history">History <span class="badge" id="queue-badge" hidden></span></a>
    </nav>
    <div class="spacer"></div>
    <div class="dropdown" id="destination">
      <button type="button" class="dropdown-toggle" id="destination-toggle" aria-haspopup="menu" aria-expanded="false">
        <span class="dest-icon" aria-hidden="true">▦</span>
        <span id="destination-label">Loading…</span>
        <span class="caret" aria-hidden="true">▾</span>
      </button>
      <div class="dropdown-menu" id="destination-menu" role="menu" hidden></div>
    </div>
  </header>

  <main>
    <section id="view-review">
      <div id="empty-state" class="empty-card card" hidden>
        <p class="hint">Paste a lead, forward an email, or drop a screenshot.</p>
        <p class="error-text" id="submit-error" hidden></p>
        <textarea id="lead-text" spellcheck="false"></textarea>
        <div class="empty-actions">
          <button type="button" class="btn" id="image-button">Upload image</button>
          <input type="file" id="lead-image" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
          <span class="file-name" id="file-name"></span>
          <button type="button" class="btn btn--primary" id="extract-button">Extract fields</button>
        </div>
      </div>

      <div id="review-body" hidden>
        <div class="split">
          <div class="card" id="panel-left">
            <div class="panel-label">Original input <span class="when" id="input-when"></span></div>
            <div class="raw-input" id="raw-input"></div>
            <div class="detected-source" id="detected-source" hidden></div>
          </div>
          <div class="card" id="panel-right">
            <div class="banner--amber" id="multi-lead-banner" hidden>Looks like more than one lead in this input. Showing the first. Review before confirming.</div>
            <div class="panel-label">Extracted fields <span class="when">Edit before confirming</span></div>
            <div id="fields"></div>
            <div class="action-row" id="action-row" hidden>
              <button type="button" class="btn btn--primary" id="confirm-button">Confirm and add row</button>
              <button type="button" class="btn btn--ghost" id="discard-button">Discard</button>
              <span class="microcopy">Nothing written until you confirm</span>
            </div>
            <div class="write-error" id="write-error" hidden>
              <span>Could not write to your sheet.</span>
              <button type="button" class="btn" id="retry-button">Retry</button>
            </div>
          </div>
        </div>
      </div>

      <div class="preview" id="sheet-preview" hidden>
        <div class="card" style="padding: 8px 6px;">
          <div class="preview-scroll">
            <table class="preview-table">
              <thead><tr id="preview-head"></tr></thead>
              <tbody id="preview-body"></tbody>
            </table>
          </div>
          <div class="preview-note" id="preview-note" hidden></div>
        </div>
      </div>
    </section>

    <section id="view-history" hidden>
      <div class="card history-list" id="history-list"></div>
    </section>
  </main>

  <template id="tpl-field-row">
    <div class="field-row">
      <label class="field-label"><span class="name"></span><span class="pill" hidden></span></label>
      <input class="field" type="text" spellcheck="false">
    </div>
  </template>

  <template id="tpl-skeleton-row">
    <div class="skeleton-row">
      <div class="skeleton skeleton--label"></div>
      <div class="skeleton skeleton--input"></div>
    </div>
  </template>

  <template id="tpl-history-item">
    <div class="history-item">
      <span class="who"></span>
      <span class="what"></span>
      <span class="when"></span>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
